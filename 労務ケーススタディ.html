  {id:15,title:"学歴詐称と懲戒解雇",cat:"採用・解雇",risk:2,q:"大卒として採用したが実際は高卒（大学中退）だった。懲戒解雇は有効か。",point:["学歴詐称は懲戒解雇事由になり得る（採用判断の誤り・信頼関係の破壊・企業秩序侵害）","ただし求人に大卒要件を明記していたか、面接で学歴質問をしたかが重要","記録がなければ懲戒解雇無効のリスクあり","普通解雇も選択肢（能力不足・協調性欠如も合わせて主張できる）","現実的には退職届を提出させ、高卒として再採用するか否かは会社の自由"],law:"西日本アルミニウム工業事件（福岡高判昭55・1・17）",keywords:["学歴詐称","懲戒解雇","採用","採用面接","証拠保全"]},
  {id:16,title:"ドライバーの手当廃止",cat:"賃金・給与",risk:3,q:"輸送手当を廃止し配送手当を導入する賃金制度変更。不利益変更への対応は？",point:["不利益変更には労使合意または就業規則変更の合理性が必要（労働契約法10条）","不利益が固定化されない仕組み（配車基準の明確化）が重要","激変緩和措置として3〜5年間の減額補填が必要","労働組合・過半数代表者との十分な交渉と説明が不可欠","配送手当の算定方法が合理的かも検討"],law:"労働契約法第10条、第四銀行事件（最判平9・2・28）",keywords:["不利益変更","輸送手当","配送手当","激変緩和","ドライバー"]},
  {id:17,title:"退職金規定の条ずれ",cat:"退職・退職金",risk:3,q:"就業規則の退職金規定に条ずれ（懲戒解雇除外規定が第55条→実際は第56条）がある。横領者に退職金を支払わずにすむか。",point:["誤記修正の主張は労働者の不利益になる場合、簡単には認められない","第55条が表彰条文なら誤りは明らかで支給しなくてよい可能性あり","第55条が他の懲戒処分条文なら2通りの読み方ができ、不支給が認められないリスクあり","速やかに誤記訂正の就業規則変更を実施すべき","懲戒解雇前に規則変更できない場合は退職金請求権放棄の書面を取得する方法も検討"],law:"丙川商店事件（京都判令3・8・6）",keywords:["退職金","就業規則","誤記","懲戒解雇","不支給"]},
  {id:18,title:"育休復職後の配置転換",cat:"育児・介護休業",risk:2,q:"育休中の営業職女性の復職時に、残業・休日出勤が多いことを理由に別職種への配置転換を勧めることは問題か？",point:["育休取得を理由とする不利益な取扱いは違法（育介法10条）","原職または原職相当職への復帰配慮が原則","経済的不利益（営業手当消失など）が大きければ違法の可能性高い","営業職が本当に残業不可避かを確認し、確認なしの配転は違法リスクあり","出張や残業対応が不可能と確認した後、本人了解を得ることが先決"],law:"育児・介護休業法第10条、両立指針（平21・12・28厚労省告示509号）",keywords:["育児休業","配置転換","不利益変更","育介法","原職復帰"]},
  {id:19,title:"休憩中の外出制限",cat:"労働時間",risk:2,q:"広大な敷地を持つ工場が「昼休憩は外出禁止」と規定。違法か。",point:["労働基準法は休憩の自由利用を原則（第34条3項）","外出禁止は「正当な理由なく許可しない」ものであり自由利用原則に反する","外出届出制（届け出れば自由に外出可）が原則","外出許可制は「事業場内で自由に休息できる場合」は直ちに違法ではないが、正当な理由なく拒否は不可","法定外休憩時間は外出一律禁止も適法"],law:"労働基準法第34条3項、昭23・10・30基発第1575号",keywords:["休憩時間","外出禁止","自由利用原則","届出制","許可制"]},
  {id:20,title:"ドライバーの割増賃金",cat:"賃金・給与",risk:3,q:"トラック運転者に「長距離手当」「業績手当」として定額支給する方法。法的問題はあるか。",point:["割増賃金は法定額以上であれば計算方法は自由だが判別可能性・対価性の要件を満たす必要あり","就業規則・賃金規程に時間外労働の対価として支払われることを明確に規定すること","基本給が不相当に低く手当が過大な場合は判別可能性なしと判断されるリスクあり","売上高の○%支給は実際の労働時間と無関係に増減し特に注意が必要"],law:"医療法人社団康心会事件（最判平29・7・7）、日本ケミカル事件（最判平30・7・19）",keywords:["固定残業代","割増賃金","判別可能性","対価性","ドライバー"]},
  {id:21,title:"パワハラ行為者と団交",cat:"労働組合・団体交渉",risk:2,q:"団交でパワハラ行為者とされる人事部長Bを出席させないことは問題か？",point:["パワハラ被疑者を団交に出席させないことは適切（紛糾リスクあり）","会社は事実確認を迅速に行う義務あり（パワハラ指針）","団交は調査結果と講じた措置を説明する場であり、事実確認の場にしてはならない","組合がB出席を繰り返し求めても応じる必要はないが、その理由を丁寧に説明すること","誠実交渉義務として裏付け資料の提示等が必要"],law:"労働組合法第7条、大阪府労委命令令3年（不）第27号",keywords:["団体交渉","パワハラ","誠実交渉","不当労働行為","事実確認"]},
  {id:22,title:"営業車での事故と賠償",cat:"労災・安全衛生",risk:2,q:"社用車で社員が居眠り運転事故。修理費と賠償金は誰が負担するか。",point:["会社は使用者責任（民法715条）により被害者へ賠償責任を負う","会社は社員へ損害の一部を求償できるが、全額請求は通常認められない","過去の最高裁は損害の4分の1が求償の目安（昭51・7・8）","保険未加入の場合は会社が直接被害者と交渉が必要","求償判断には事業規模・労働条件・予防措置（安全研修等）の配慮程度が考慮される"],law:"最判昭51・7・8、民法第715条",keywords:["使用者責任","求償","社用車","交通事故","賠償"]},
  {id:23,title:"事業縮小と雇止め",cat:"採用・解雇",risk:3,q:"有期契約の社員（4回更新済）を事業縮小を理由に次回更新しないことはできるか。",point:["4回更新済みで恒常業務なら雇止め法理が適用される可能性が高い","雇止め法理が適用されても整理解雇4要素（削減必要性・回避努力・人選合理性・手続き）を満たせば可","黒字での合理化目的なら一方的雇止めは認められにくい","他部署への配転可能性の検討・退職勧奨も必要","雇止めリスクが高い場合は解決金を支払って合意退職を検討"],law:"労働契約法第19条、エヌ・ティ・ティ・ソルコ事件（横浜地判平27・10・15）",keywords:["雇止め","有期労働契約","整理解雇","雇止め法理","事業縮小"]},
  {id:24,title:"連絡が取れない休職者",cat:"休暇・休職",risk:3,q:"突然「うつ病で1カ月休職」とメールが届いたが、その後連絡が取れない。どう対応すべきか。",point:["まず正式な休職命令書を作成し郵送＋メールで送付","連絡が取れない場合は自宅訪問で安否確認を実施","自宅に住んでいる形跡があれば「行方不明」とは判断できず当然退職扱いは不可","連絡不通を理由に休職期間満了前の解雇も慎重な判断が必要","休職期間満了まで雇用継続が安全（満了後の扱いは就業規則による）"],law:"北港観光バス事件（大阪高判平26・4・23）、OSI事件（東京地判令2・2・4）",keywords:["休職","連絡不通","行方不明","退職扱い","解雇"]},
  {id:25,title:"社用車の私的利用とガソリン代",cat:"賃金・給与",risk:2,q:"就業時間中に社用車を私的使用したドライバーから賃金でガソリン代を控除してよいか。",point:["賃金全額払い原則（労基法24条）により賃金からの控除は制限される","労使協定による控除は「事理明白なもの」に限定され、ガソリン代は該当しない","労働者個別の自由な意思に基づく同意があれば控除可能（同意書が必要）","ただし圧力下での同意や計算説明不十分では同意無効のリスクあり","最も問題が少ない方法は賃金を全額支払い、別途ガソリン代を請求すること"],law:"日新製鋼事件（最判平2・11・26）、住友生命保険事件（大阪高判令6・5・16）",keywords:["賃金控除","全額払い原則","同意","社用車","ガソリン代"]},
  {id:26,title:"内定後提出物の替え玉と内定取消",cat:"採用・解雇",risk:2,q:"内定後の課題を同級生に代行させていた内定者。さらに採用試験の筆記試験も代行。内定取消は可能か。",point:["内定後の提出物代行は入社前研修と同様の性格であり、これだけでの内定取消は困難","採用試験の筆記試験代行（替え玉受験）は内定取消の正当な理由になる","替え玉受験は採用内定当時に知ることができなかった事実であり客観的合理性あり","紛争防止のために一方的取消よりも内定辞退の書面を提出させる方が安全","入社前研修は任意であることを明確に伝えることで不正防止"],law:"大日本印刷事件（最判昭54・7・20）、宣伝会議事件（東京地判平17・1・28）",keywords:["内定取消","替え玉受験","採用試験","入社前研修","内定辞退"]},
  {id:27,title:"採用サイトの個人情報",cat:"個人情報",risk:2,q:"求人サイトの「先輩インタビュー」に掲載されていた社員が退職。インタビューを削除すべきか。",point:["退職者の氏名は個人データに該当し、第三者提供（サイト掲載）の停止を請求できる","個人情報保護法35条5項の「本人の権利または正当な利益が害されるおそれがある場合」に該当","会社は遅滞なく求人サイトからの削除対応が必要","労働者名簿は退職後3年間保存義務（削除は3年経過後）","退職後は賃金台帳等の保存義務に留意しつつ不要な個人情報は削除・廃棄"],law:"個人情報保護法第27条、第35条5項",keywords:["個人情報","個人データ","採用サイト","削除","退職"]},
  {id:28,title:"固定残業代の廃止",cat:"賃金・給与",risk:3,q:"月45時間分の固定残業代を廃止して実労働時間払いにしたい。どのような手続きが必要か。",point:["固定残業代の廃止は労働契約の変更であり労使合意が原則","自由な意思に基づく同意が必要で、同意書取得だけでは不十分な場合あり","実労働時間払いで大幅減額なら同意の有効性認定ハードルが高い","雇用契約に廃止権限を明記していれば合意不要で廃止可能","就業規則変更による廃止には不利益の全補填（基本給増額等）が事実上必要"],law:"山梨県民信用組合事件（最判平28・2・19）、インテリム事件（東京高判令4・6・29）",keywords:["固定残業代","廃止","不利益変更","同意","就業規則変更"]},
  {id:29,title:"長時間電話はカスハラ？",cat:"ハラスメント",risk:1,q:"毎日30分近く同じ内容を質問してくる高齢者の電話。カスハラに当たるか？",point:["同じ質問を平穏な態様で繰り返すだけでは社会通念上不相当とまではいえずカスハラに当たらない","まず「他の方への対応が必要で長時間対応は困難」と顧客に説明すること","暴言・脅迫・執拗な要求があって初めてカスハラに該当し得る","カスハラに該当する事案では使用者は安全配慮義務の問題が生じる","継続する場合は書面で正式に対応を断ることも検討"],law:"東京都カスタマー・ハラスメント防止条例、東京高判令4・11・22",keywords:["カスタマーハラスメント","カスハラ","安全配慮義務","クレーム","電話対応"]},
  {id:30,title:"就業時間中の組合勧誘",cat:"労働組合・団体交渉",risk:2,q:"社員が就業時間中に労働組合への加入勧誘を行っている。懲戒できるか。",point:["就業時間中の組合活動は職務専念義務違反として禁止できる","ただし就業外・始業前・休憩時間の活動を理由とした不利益取扱いは不当労働行為となる","勧誘が就業時間中か否か・方法・時間を正確に確認すること","過去の黙認や私語を禁じていない職場で組合活動のみ厳しく取り締まることは支配介入のリスクあり","初回は指導にとどめ、繰り返した場合に懲戒を検討"],law:"労働組合法第7条1号・3号、北海道地労委平9年（不）第4号",keywords:["組合活動","就業時間","不当労働行為","支配介入","懲戒"]},
  {id:31,title:"就業規則変更の施行日",cat:"就業規則",risk:2,q:"家族手当廃止の就業規則変更後、届出前に施行できるか。今月分から廃止できるか。",point:["就業規則変更は合理性と周知で効力発生（届出は必須要件ではない）","周知日より前に施行日を設定することはできない","すでに発生した賃金に就業規則変更を遡及適用することは不可","家族手当廃止の合理性確保には総賃金原資の維持（基本給増額等）と激変緩和措置が重要","給与締め日をまたぐ場合は締め日前後の日割り計算に注意"],law:"労働契約法第10条、北海道国際航空事件（最判平15・12・18）",keywords:["就業規則変更","施行日","周知","不利益変更","家族手当"]},
  {id:32,title:"SNS炎上と損害賠償",cat:"懲戒・服務",risk:3,q:"パワハラを訴えていた社員が会社名・加害者実名をSNSに投稿して炎上。損害賠償請求できるか。",point:["名誉毀損による損害賠償請求は社会的評価の低下・公然性の要件を満たす場合に認められる","ただし投稿内容が真実で公益目的があれば損害賠償請求が認められないこともある","会社はパワハラ調査経緯・対応記録を具体的に保全しておく","投稿内容・拡散状況・コメントをスクリーンショットで証拠保全","クレーム電話の日時・内容も記録（損害立証に役立つ）"],law:"最判昭41・6・23、東京高判令2・11・11",keywords:["SNS","名誉毀損","損害賠償","炎上","パワハラ"]},
  {id:33,title:"玄関先の転倒は通勤災害？",cat:"労災・安全衛生",risk:2,q:"自宅の玄関を出る際に家族の靴につまずいて転倒・骨折。通勤災害に該当するか。",point:["「通勤」とは住居と就業場所の往復であり住居内の移動は通勤ではない","一戸建ては門の外から、マンション・アパートは各部屋の扉の外からが通勤の起点","玄関内（一般人が自由に通行できない場所）での転倒は通勤災害に当たらない可能性が高い","会社は「通勤災害ではない」と断定せず、労基署への相談を労働者に勧めること","労災申請の時効（療養給付・休業給付は2年）に注意"],law:"労災保険法第7条2項、昭49・7・15基収第2110号",keywords:["通勤災害","住居","玄関","転倒","労災申請"]},
  {id:34,title:"試用期間の延長",cat:"採用・解雇",risk:2,q:"試用期間中に交通事故で6カ月休業した社員。復帰後も試用期間として延長できるか。",point:["就業規則に延長規定がある場合は延長事由・期間・回数が明記されている必要あり","延長事由が休業等で適格性判断ができない場合なら合理的事由あり、本人通知で延長可","就業規則に延長規定がない場合は労働者の同意が必要","延長期間は適格性確認に必要かつ相当な期間（原則3カ月程度）","試用期間延長は不利益変更でもあるため丁寧な説明と合意書面化が重要"],law:"上原製作所事件（長野地裁諏訪支部判昭48・5・31）",keywords:["試用期間","延長","就業規則","休業","適格性"]},
  {id:35,title:"横領疑惑の調査",cat:"懲戒・服務",risk:3,q:"作業員が集金した現金を着服している疑いあり。どのように調査・処分すべきか。また経理担当者の処分は？",point:["まず顧客に支払い確認を行い（Cに告げずに）、領収証コピーを確保","その後Cへの事情聴取で不正の全貌を白状させ横領金額を確定","Cから横領を認め弁償を誓約する書面を取得","横領が確認されれば懲戒解雇が相当、刑事告訴も検討","経理のBは入金確認業務の懈怠について懲戒処分（訓戒等）の対象となり得る"],law:"ツナガルホールディングス事件（東京地判平30・6・29）",keywords:["横領","懲戒解雇","証拠保全","着服","刑事告訴"]},
  {id:36,title:"社内ストーカー対応",cat:"ハラスメント",risk:3,q:"半年前に発覚した社員によるストーカー行為が配置転換後も継続。どう対応すべきか。",point:["まず被害者の心身状況を確認し、通勤への付き添いも検討","被害内容・日時・場所をヒアリングし記録化、同僚目撃者からも聴取","加害者（U係長）の別支店等への配置転換で物理的接触を排除","懲戒処分は待ち伏せ回数・被害内容・反省程度・地位等を総合考慮","警察や弁護士を活用した警告もストーカー行為抑制に有効"],law:"ストーカー規制法、PwCあらた有限責任監査法人事件（東京高判令3・7・14）",keywords:["ストーカー","ハラスメント","配置転換","懲戒","警察連携"]},
  {id:37,title:"求職者の病歴確認",cat:"採用・解雇",risk:2,q:"介護職への応募者に1年間の療養歴あり。病名を確認していいか。",point:["採用選考時の具体的病名の直接質問は就職差別につながるとして厚労省が問題事例として指摘","代わりに「再発・欠勤のおそれはあるか」「仕事に不安な点はあるか」「配慮してほしい点はあるか」などで確認","職種に関連する健康状態（腰痛歴等）は必要性を説明した上で本人同意を得て確認可能","1つずつ質問することで具体的な回答を得やすい","自発的な説明を促す雰囲気づくりが重要"],law:"職業安定法、厚労省「公正な採用選考をめざして」",keywords:["病歴","採用選考","個人情報","健康状態","就職差別"]},
  {id:38,title:"早すぎる出社と残業代",cat:"労働時間",risk:2,q:"始業1時間以上前に出社する社員が増えた（朝食を食べているとの認識）。残業代を払う必要はあるか。",point:["始業前の時間は原則として労働時間に当たらないが例外あり","始業1時間以上前の出社は業務目的で早出したと推認される可能性がある（足利セラミックラボラトリー事件）","上司の指示による早出であれば労働時間と認め残業代の支払い義務あり","社員と現場上司からのヒアリングで早出の理由・指示の有無を確認","業務開始時と終了時にタイムカード打刻を義務付ける仕組みに変更を検討"],law:"足利セラミックラボラトリー事件（仙台高判令5・11・30）",keywords:["早出","労働時間","割増賃金","タイムカード","黙示の指示"]},
  {id:39,title:"競合他社への転職と退職金",cat:"退職・退職金",risk:2,q:"20年勤務の営業マンが退職後にライバル社へ転職。退職金800万円を減額できるか。",point:["退職金規程に競合他社転職時の減額規定がある場合は適用可能（三晃社事件）","退職金に後払い的性質が強い場合、減額規定なしには全額払い原則に反する","功労報奨的性質が強い場合（規程なし・決定裁量あり）は合意書があれば減額しやすい","競合他社での業務内容・顧客引き抜きの有無・機密情報持ち出しが重要考慮要素","同商材の営業でなければ会社の営業権侵害なしとして減額不可の可能性"],law:"三晃社事件（最判昭52・8・9）、EVOLUTION JAPAN事件（東京地判平28・4・15）",keywords:["退職金","競業避止","転職","功労報奨","賃金全額払い"]},
  {id:40,title:"未成年者との労働契約",cat:"採用・解雇",risk:2,q:"高校生アルバイト（17歳）の母親から「辞めさせる」との電話。本人は「辞めない」と言っているが従う義務はあるか。",point:["未成年者の雇用契約には親権者の同意が必要","親権者の同意なく締結した契約は親権者が取り消しできる","本人の意思に関わらず、親権者（母親）は単独で取消し可能","父母が親権者の場合、双方の同意が必要→片方の反対で単独取消も可能","未成年者採用時は両親権者双方から同意書を取得すること"],law:"民法第5条、民法第818条3項、労基法第58条2項",keywords:["未成年","親権","労働契約","取消","アルバイト"]},
  {id:41,title:"勤務地限定者の転勤希望",cat:"異動・配転",risk:2,q:"東京勤務限定の社員がパートナーの転勤で札幌に引越し、札幌店での勤務を希望。応じる義務はあるか。",point:["会社は東京勤務限定の契約を守る義務があり、札幌勤務を認める義務はない","応じる場合は雇用契約の変更（合意）が必要","賃金が下がる場合は社員の自由な意思に基づく合意が必要（同意書＋十分な説明）","書面で変更理由・変更後の賃金を具体的に説明してから同意を取得すること","別の選択肢：いったん退職後に札幌で新規採用、または在宅勤務制度の活用"],law:"三菱重工業事件（東京地判平28・1・26）、山梨県民信用組合事件（最判平28・2・19）",keywords:["勤務地限定","配転","異動","賃金減額","合意"]},
  {id:42,title:"長すぎる休憩",cat:"労働時間",risk:1,q:"クリニックが午前・午後の診療の間に3時間の休憩を設けている。長すぎる休憩への規制はあるか。",point:["労働基準法は休憩時間の最短は規定しているが最長の規制はない","ただし長時間休憩を取れていなかったと後日争われた場合に備え記録が必要","休憩開始・終了時刻をタイムカードで打刻させることで取得の証拠を残す","就業規則に休憩の位置（何時〜何時）まで明記することが望ましい","休憩中の電話・患者対応がないことを明確にすること"],law:"労働基準法第34条1項、ライフデザインほか事件（東京地判令2・11・6）",keywords:["休憩時間","クリニック","打刻","就業規則","証拠保全"]},
  {id:43,title:"派遣社員の競業避止",cat:"労働組合・団体交渉",risk:2,q:"派遣社員に3年間の競業避止義務を課すことは可能か。",point:["派遣就業中の競業避止義務は有効","派遣就業終了後の競業避止義務には代償措置がない場合、公序良俗違反で無効となる可能性が極めて高い","目的（機密情報保護）は正当だが派遣社員は経営上の重要機密に接する立場にはない","3年間・競業他社全禁止・代償措置なしは無効リスクが高い","機密保持義務（誓約書・合意書）と物理的アクセス制限・研修での対応が現実的"],law:"創育事件（東京地判令5・6・16）",keywords:["競業避止","派遣社員","機密保持","代償措置","公序良俗"]},
  {id:44,title:"忘年会での暴行と懲戒",cat:"懲戒・服務",risk:3,q:"忘年会で酒瓶で同僚を殴り全治1週間・現行犯逮捕された社員。解雇は有効か。",point:["酒瓶での暴行は危険性高いが、全治1週間・業務外・懲戒歴なしなら解雇無効のリスクあり","鹿島建設事件（令6）でも懲戒歴なし・軽い処分の過去事例あれば解雇無効の判断あり","懲戒歴がない場合は出勤停止等の懲戒処分にとどめる方が安全","雇用継続が難しければ懲戒処分手続き中に退職勧奨を試みる","有期雇用社員の場合は無期雇用よりハードルが高いことに注意"],law:"労働契約法第15条、鹿島建設事件（東京地判令6・10・22）",keywords:["暴行","懲戒解雇","忘年会","解雇無効","懲戒歴"]},
  {id:45,title:"昼休憩のケガは労災？",cat:"労災・安全衛生",risk:2,q:"会議終了後に休憩時間中に会議室から執務室へ戻る際に階段から転落。業務災害か？",point:["業務遂行性は事業場内であれば問題なく認められる","休憩時間中の事故は原則として業務起因性が否定される","ただし施設の欠陥（暗い・障害物等）が原因なら業務起因性が肯定される","会議室から執務室への移動は私的行為でなく業務起因性あり認定の可能性が高い","階段の状態を記録・安全管理義務（安衛則541条）の遵守確認"],law:"労災保険法、安衛則第541条・542条",keywords:["業務災害","業務起因性","休憩時間","転落","施設の欠陥"]},
  {id:46,title:"停電故障時の休業手当",cat:"賃金・給与",risk:2,q:"台風による停電で冷蔵庫が壊れ3日間休業。従業員に休業手当を払う義務はあるか。",point:["台風が直接の原因ではなく設備故障が原因なら「設備の欠陥に起因する休業」として使用者の責に帰すべき事由","他の業務・掃除・研修等で就業させる余地があれば不可抗力とはいえない","民法536条2項（全額払い義務）は使用者の故意・過失が必要で今回は6割払いで足りる可能性","全社員を同様に休業させれば一部社員のみより全額払い請求リスクが低い","就業規則に使用者の責に帰すべき事由による休業を民法536条の対象外とする規定を置くことを検討"],law:"労働基準法第26条、民法第536条2項",keywords:["休業手当","停電","設備故障","不可抗力","賃金全額払い"]},
  {id:47,title:"育休延長と落選目的応募",cat:"育児・介護休業",risk:2,q:"育休延長を繰り返す社員への対応。2025年4月からの給付延長手続き厳格化への対応は？",point:["2025年4月から落選目的の保育所応募は育休給付の延長対象外","自宅・勤務先から30分以上の施設のみへの応募は速やかな復帰希望実態なしとみなされる","会社は育休入り時に制度変更を説明し、子の1歳誕生日前に面談を設定","延長申出の際に保育所申込みが適正に行われているか確認する社内手続きの整備を検討","研修・相談窓口での周知は正当な延長申出を委縮させないよう配慮が必要"],law:"育児介護休業法、雇用保険法",keywords:["育児休業","保育所","給付金","延長","落選目的"]},
  {id:48,title:"営業中のスキマバイト",cat:"懲戒・服務",risk:3,q:"外回り営業中にスキマバイトをしている疑いがある社員。どう対応すべきか。",point:["就業時間中のスキマバイトは業務放棄であり背信性が極めて重大","パチンコとは異なり、バイト中は会社業務への対応が物理的に不可能","給与全額受領しながら二重雇用は悪質で懲戒解雇が可能と判断される可能性あり","ただし社風（サボり黙認）をF社が作ってきた落ち度を考慮し出勤停止等にとどめる選択も","今回を機に職務専念義務の厳格な運用・就業規則整備・全社周知が必要"],law:"ジャムコ立川工場事件（東京地裁八王子支判平17・3・16）",keywords:["スキマバイト","職務専念義務","兼業","懲戒解雇","二重雇用"]},
  {id:49,title:"叱責後の勝手な帰宅",cat:"賃金・給与",risk:2,q:"「やる気がないなら帰れ」と叱責したら本当に帰宅。発言はパワハラか？帰宅分の賃金を払う必要はあるか？",point:["叱責がパワハラに当たるかはミスの程度・頻度・継続性・労働者属性を総合考慮","些細なミスへの「もう帰れ」はパワハラになりやすい、重大ミスへの叱責は必要かつ相当の範囲内","パワハラに当たる場合は会社の責に帰すべき事由があり賃金全額の支払い義務が生じる","パワハラに当たらない場合は労働者の自己都合の早退として賃金支払い義務なし","帰宅を「命じた」と評価されないために発言の趣旨を明確にすることが重要"],law:"民法第536条2項、労働基準法第26条",keywords:["パワハラ","叱責","帰宅","賃金","業務上相当"]},
  {id:50,title:"正社員だけに健診補助",cat:"均等・均衡待遇",risk:2,q:"がん検診費用補助制度を正社員のみに導入。再雇用者やパート労働者を対象外にしていいか。",point:["パート・有期法8条により不合理な待遇差が禁止される","制度の目的（長期就業確保・がん早期発見）は再雇用者・パートにも妥当する可能性あり","大阪医科薬科大学事件のような広範な対象者への恩恵的給付ではなく雇用契約との結びつきが強い","労働組合と十分な交渉なしに正社員のみ対象とすることは違法のリスクが高い","職務内容・異動範囲の違いがあっても全く補助しないことは違法と考えるべき"],law:"パートタイム・有期雇用労働法第8条、大阪医科薬科大学事件（大阪高判平31・2・15）",keywords:["均等待遇","均衡待遇","パート","有期雇用","福利厚生"]},
  {id:51,title:"賃金の非常時払い",cat:"賃金・給与",risk:1,q:"入居予定が延期でホテルから通勤することになった社員が賃金の前払いを希望。非常時払いに該当するか？",point:["労基法の非常時払いは出産・疾病・災害・帰郷等の具体的事由に限定","ホテルから通勤するケースは非常時払いの法的義務に該当しない","実家に帰郷するなら「やむを得ない事由による一週間以上の帰郷」として義務対象","義務がなくても会社が合意により支払うことは可能","前払い対応の際は振込手数料の控除（全額払い原則）・支払い回数増加に注意"],law:"労働基準法第25条、労基法施行規則第9条",keywords:["非常時払い","前払い","賃金","帰郷","振込手数料"]},
  {id:52,title:"生理休暇と年休の先後",cat:"休暇・休職",risk:1,q:"生理休暇と年休のどちらを先に取るべきか？就業規則に規定がなく整備が必要。",point:["生理休暇は法律上の義務（労基法68条）だが就業規則規定なしでも与える必要あり","就業規則に賃金規定がなければ生理休暇取得日の賃金支払い義務はない","生理休暇と年休の要件をどちらも満たす場合、どちらを先に取るかは従業員の自由","年休を先に取る方が有利（無給の生理休暇より有給の年休を温存できる）","取得の際はどちらを取得するか明確化させることが必要（就業規則整備も急務）"],law:"労働基準法第39条・68条",keywords:["生理休暇","年次有給休暇","就業規則整備","賃金","取得順序"]},
  {id:53,title:"タイムカードの誤廃棄",cat:"労働時間",risk:3,q:"5年間分のタイムカードを誤って廃棄。残業代請求リスクへの対応は？",point:["タイムカードは3年間の保存義務あり（労基法109条）、違反は30万円以下の罰金","故意でない廃棄への刑事罰適用なし","訴訟で文書提出命令が出されると「廃棄した」との主張が認められない可能性あり","廃棄が認められなければ労働者の主張する労働時間を真実と認定されるリスク","廃棄発覚時点で担当者から顛末書を取得し証拠を保全しておく"],law:"労働基準法第109条、民事訴訟法第221条・224条",keywords:["タイムカード","廃棄","保存義務","文書提出命令","残業代"]},
  {id:54,title:"暑気払いの食中毒は労災？",cat:"労災・安全衛生",risk:2,q:"会社主催の暑気払いで食中毒。業務災害として認定されるか？",point:["業務遂行性は事業場内・労働者が支配下にある状態なら認められる","宴会への参加が業務起因性を持つには事業活動と密接な関連・参加が強制または要請されていたことが必要","費用全額会社負担・全員参加・社長調整なら業務起因性が認められやすい","単なる慰安・親睦目的で参加強制なし→業務遂行性なし（食中毒も労災認定されない）","業務目的があり強制参加なら宴会食中毒も業務起因性あり"],law:"仙台高判令3・12・2、名古屋高裁金沢支判昭58・9・21",keywords:["労働災害","業務起因性","宴会","食中毒","業務遂行性"]},
  {id:55,title:"配属先確約後の変更",cat:"異動・配転",risk:2,q:"内定者に配属先を確約したが、配属先の社員とトラブル（ほぼストーカー状態）が判明。配属変更は可能か。",point:["まずBへのヒアリングで被害内容を確認し、Aからも事情を聴く","職種限定契約でなければ配属先変更に関する権利濫用か否かの問題","新卒者は職業経験が少なく配属変更による不利益が小さい","目的はトラブル防止であり不当な動機・目的ではない→権利濫用には当たらない","Bの被害・心身状況を踏まえ必要性が高い場合はAの同意なく変更が認められる"],law:"東亜ペイント事件（最判昭61・7・14）、滋賀県社会福祉協議会事件（最判令6・4・26）",keywords:["配属先","内定","配置転換","権利濫用","ストーカー"]},
  {id:56,title:"ストライキ回避の相談",cat:"労働組合・団体交渉",risk:2,q:"組合員から「ストライキをやめさせてくれ」と相談が。会社側から個人に働き掛けることは可能か。",point:["ストを回避したい場合は組合と交渉すべきであり、個人組合員への働き掛けは支配介入（不当労働行為）のリスクあり","組合員への個人的な面談・圧力はストライキの中止を求めるものとして支配介入と判断される（東京都労委令2年）","相談してきた組合員には「組合と話す」と伝えることが適切","ストに備えた代替人員の確保等の準備は適法","会社が許容できる範囲での条件提示を積極的に行うことがスト回避に有効"],law:"労働組合法第7条3号、東京都労委令2年（不）第67号命令",keywords:["ストライキ","不当労働行為","支配介入","組合員","団体交渉"]},
  {id:57,title:"忘れられた労使協定",cat:"就業規則",risk:2,q:"10年以上前の労使協定で結婚祝金5万円の規定があるが、実態は3万円を支給していた。遡って支給義務があるか。",point:["労使協定が労働協約としての効力を持つ場合（組合と書面締結・署名捺印）は5万円の支払いが義務","労使協定自体は規制解除効果のみで個別の権利義務を生じさせないが、労働協約は例外","有効期間・自動更新規定を確認し、効力が消滅していないか確認","結婚祝金が賃金としての性質を持つ場合の消滅時効は3年","速やかに誤りを是正する就業規則・労使協定の整備が必要"],law:"労働組合法第14条・15条・16条、昭22・9・13発基17号",keywords:["労使協定","労働協約","結婚祝金","遡及","消滅時効"]},
  {id:58,title:"原状回復費の賃金控除",cat:"賃金・給与",risk:2,q:"社員寮の退寮時の原状回復費を就業規則と労使協定で賃金控除できるか。",point:["労使協定による控除が許されるのは「事理明白なもの」に限定","毎月定額の寮費は事理明白なものとして労使協定での控除が可能","原状回復費は個別算定・金額争いが生じやすいため「事理明白なもの」には当たらない","個別に自由な意思に基づく合意があれば控除可能（退寮時に金額確定後に同意を得る）","入寮条件として控除に同意させる方法は強制的同意として無効とされるリスクあり"],law:"住友生命保険事件（大阪高判令6・5・16）、プレナス事件（大分地判平29・3・30）",keywords:["賃金控除","労使協定","社員寮","原状回復費","同意"]},
  {id:59,title:"スポットワーカーの労災",cat:"労災・安全衛生",risk:3,q:"1日だけのスポットワーカーがカゴ車転倒で全治3カ月の骨折。雇入れ時の安衛教育は必要だったか。",point:["雇入れ時の安全衛生教育義務は雇用期間1日でも適用され除外規定なし（安衛法59条）","カゴ車の使用方法・転倒防止等の具体的な教育が必要","違反には50万円以下の罰金（法人も両罰規定）","事故により書類送検の可能性があり、捜査開始リスクあり","安全管理者選任（50人以上の場合）も事故をきっかけに調査対象になり得る"],law:"労働安全衛生法第59条、安衛則第35条",keywords:["スポットワーク","雇入れ時教育","安全衛生","労災","書類送検"]},
  {id:60,title:"粗暴な組合活動への対応",cat:"労働組合・団体交渉",risk:2,q:"組合員3人が突然社長室を訪問し、机を叩きながら大声で団交開催を迫った。懲戒は可能か。",point:["威力を示す粗暴な言動は企業秩序を乱す行為として懲戒事由になり得る","懲戒の理由は団交要求そのものではなく粗暴な言動であり、通常は不当労働行為にはならない","ただし過去に同様の行為を黙認してきた経緯があれば不当労働行為と判断されるリスクあり","延期を求めたこと自体は組合の意思に反するかもしれないが、激昂して粗暴な言動をする理由にはならない","懲戒が権利濫用とならないよう処分の重さに注意（停職14日が有効とされた判例あり）"],law:"労働組合法第7条1号、学校法人君津学園事件（東京地判令6・6・27）",keywords:["組合活動","懲戒","粗暴行為","不当労働行為","団体交渉"]},
  {id:61,title:"貸与物を返さない退職者",cat:"退職・退職金",risk:1,q:"退職者がカメラ（10万円）を返却せず連絡も取れない。法的手段は？",point:["内容証明郵便で返還請求→訴訟→動産の引渡し強制執行という流れ","所有権に基づく返還請求権または使用貸借契約終了に基づく返還請求権","強制執行は費用・手間がかかり、在宅でないとカメラを発見できないリスクもある","10万円程度なら費用対効果から回収を諦める判断も合理的","カメラに個人情報（イベント参加者）が含まれる場合は諦められない事情も","退職時の貸与物返却チェックリストを整備し未然防止を"],law:"民法（所有権・使用貸借）、民事執行法第8条",keywords:["貸与物","返還","強制執行","退職","証拠保全"]},
  {id:62,title:"勘違いで全員正社員化",cat:"有期・無期転換",risk:2,q:"無期転換を「正社員化」と勘違いし5年超更新時に全員正社員化してきた。今後は無期契約社員への転換に変更したい。",point:["無期転換は正社員化義務ではなく、契約期間が無期になるだけが原則","就業規則を変更して無期転換後の待遇を「有期契約と同じ」と明記することが可能（ハマキョウレックス無期転換事件）","すでに無期転換申込権が発生している社員には従来どおり正社員への転換を認めるべき","未発生の社員は就業規則変更後に申込権取得→変更後の扱いが適用される","正社員と契約社員の待遇差がパート・有期法8条に反しないかを事前確認"],law:"労働契約法第18条、ハマキョウレックス無期転換事件（大阪高判令3・7・9）",keywords:["無期転換","正社員化","有期雇用","就業規則変更","均衡待遇"]},
  {id:63,title:"営業成績手当と割増賃金",cat:"賃金・給与",risk:2,q:"毎月全員に1万円以上支給される「営業成績手当」を割増賃金基礎から除外できるか。",point:["割増賃金基礎除外には「臨時に支払われた賃金」に当たることが必要","通達上は「非常にまれに発生する」ものが要件","裁判例は「ほぼ毎月支給」は「臨時」とは言えないとする傾向（アヴァック事件）","毎月全員に1万円以上なら「臨時に支払われた賃金」とは言えず基礎に含めるべき","3カ月ごとの成績支給に変更すれば「1カ月を超える期間ごとに支払われる賃金」として除外可"],law:"労働基準法第37条、アヴァック事件（大阪地判令6・9・13）",keywords:["割増賃金","基礎除外","営業成績手当","臨時賃金","パートタイム"]},
  {id:64,title:"契約社員とキャリア研修",cat:"均等・均衡待遇",risk:2,q:"入社2年目に義務付ける「技術力向上研修（実態はキャリアデザイン研修）」に契約社員を参加させなくてよいか。",point:["パート・有期法9条の均等待遇は雇用関係終了まで職務・異動範囲が正社員と同じ有期社員に限定","短期雇用の契約社員は「通常の労働者と同視すべき有期雇用労働者」に該当しないケースが多い","長期雇用前提のキャリアデザイン研修なら短期雇用の契約社員を対象外としても不合理ではない","ただし長期勤続実態のある契約社員には適用外が不合理となりパート・有期法8条に反する可能性","技術力向上目的であれば業務上必要な契約社員への実施義務あり（パート・有期法11条1項）"],law:"パートタイム・有期雇用労働法第8条・9条・11条",keywords:["均等待遇","均衡待遇","契約社員","研修","キャリアデザイン"]},
  {id:65,title:"業務クレカのポイントの私的利用",cat:"懲戒・服務",risk:2,q:"会社名義クレカ利用で貯まったポイントを社員が私的に使用。解雇できるか。",point:["会社名義アカウントに付与されたポイントは会社のものであり、私的使用は横領と同等の背信行為","中央建物事件（令5）でポイントの私的利用による普通解雇を有効と判断","ただし個人アカウントへの付与で明確な使用方法の指示がなければ解雇無効リスクあり","処分前に上司の指示・前任者の取扱い・前任者の実態を確認すること","今後のためにポイントの取扱いルールを社内で明確化・文書化する"],law:"中央建物事件（大阪地判令5・10・19）",keywords:["クレジットカード","ポイント","私的利用","解雇","就業規則"]},
  {id:66,title:"所持品検査の拒否",cat:"懲戒・服務",risk:2,q:"顧客から現金紛失申告あり。社員の所持品検査を命じたが社員が拒否。強制できるか。",point:["所持品検査義務化には4要件：①合理的理由②妥当な方法・程度③画一的実施④就業規則明示根拠","就業規則に規定がなければ強制不可","今後就業規則に規定を設けることは不利益変更だが引越し業なら合理性あり","ロッカー・自家用車内の検査はプライバシー侵害で特段の事情がない限り不可","顧客への現金管理注意書の明記・作業前の確認で同様のトラブルを未然防止"],law:"西日本鉄道事件（最判昭43・8・2）、セコム事件（東京地判平28・5・19）",keywords:["所持品検査","就業規則","プライバシー","拒否","引越し業"]},
  {id:67,title:"労災の損害賠償請求",cat:"労災・安全衛生",risk:3,q:"プレス機作業中に新人が指を切断（後遺障害12級相当）。損害賠償請求に備え何を準備すべきか。",point:["安全教育の不備・安全装置の欠陥が賠償責任の主な争点","被災者・目撃者から事故状況をヒアリングし書面化、確認サインをもらう","現場の写真撮影・操作マニュアルの確認・安全装置の作動状況を記録","特別教育実施記録の確保（3年間保存義務）","外国人被災者の場合は理解できる言語での教育実施が必要"],law:"労働安全衛生法第59条・131条、民法第418条",keywords:["労災","損害賠償","安全配慮義務","プレス機","安全教育"]},
  {id:68,title:"見落とした年休申請",cat:"休暇・休職",risk:3,q:"退職者が上司の机に年休申請書を置いたまま退職。上司が気付かず欠勤扱いにしたが、未払い賃金を請求された。",point:["年休の成立に使用者の承認は不要（白石営林署事件・最判昭48・3・2）","申請書提出=時季指定であり、上司が気付かなくても年休が成立","申請書の承認欄設置は適切でなく、就業規則の承認要件は無効","時季変更権の行使がなければ年休は取得済みとして賃金支払い義務あり","判決前に速やかに和解・支払いをして付加金（同額追加）を回避することを勧める"],law:"労働基準法第39条、白石営林署事件（最判昭48・3・2）",keywords:["年次有給休暇","時季指定","承認","未払い賃金","付加金"]},
  {id:69,title:"発信者情報開示の手順",cat:"個人情報",risk:2,q:"SNS・掲示板での社名・個人名の誹謗中傷。発信者情報開示の手順は？",point:["発信者情報開示命令申立てが有効な手続き（プロバイダ責任制限法5条）","掲示板運営会社→インターネット接続事業者の2段階で開示を求める","開示まで3カ月程度を要する","名誉毀損または違法な侮辱に当たることが要件","投稿が真実で公益目的なら開示が認められない可能性あり","早期にスクリーンショット等で証拠保全し、アクセスログが消える前に申立てを"],law:"プロバイダ責任制限法第5条",keywords:["誹謗中傷","発信者情報開示","名誉毀損","SNS","個人情報"]},
  {id:70,title:"顧客情報の秘密管理性",cat:"個人情報",risk:2,q:"退職した営業マンが顧客リストを持ち出し。鍵のかからない引き出しで管理していた場合、営業秘密として不正競争防止法が使えるか。",point:["営業秘密としての「秘密管理性」（秘密として管理されていたか）が最重要要件","顧客情報は技術情報より秘密管理性を厳格に判断すべき傾向あり","鍵なし・誰でも閲覧可能な状態なら秘密管理性が認められない可能性が高い","「マル秘」表示・コピー制限・誓約書での具体的秘密保持義務設定が必要","IDパスワードだけでは秘密管理性を認めないとした裁判例あり"],law:"不正競争防止法第2条第6項",keywords:["営業秘密","秘密管理性","顧客リスト","不正競争防止法","情報管理"]},
  {id:71,title:"割増賃金の付加金",cat:"賃金・給与",risk:2,q:"着替え時間の割増賃金未払いで訴訟中。判決確定前に未払い分を支払えば付加金を回避できるか。",point:["付加金は判決確定後に初めて発生するため、確定前の支払いで付加金を回避・減額できる","審理中に未払い額の一部でも支払うことで判決時の付加金額を圧縮できる","第一審で付加金を命じられても控訴して割増賃金を支払えば付加金命令が確定しない","控訴審で高裁が残額を認定した場合はその範囲で付加金命令の可能性あり","和解による解決が最も付加金リスクを回避しやすい"],law:"労働基準法第114条、最判平26・3・6",keywords:["付加金","割増賃金","訴訟","和解","控訴"]},
  {id:72,title:"年休取得を拒否する社員への対応",cat:"休暇・休職",risk:3,q:"年5日の時季指定義務に従い年休を指定したが、時季指定日に無断出勤する社員がいる。是正報告のためにどうすべきか。",point:["会社が時季指定＋労務受領の拒絶を明確にすれば、社員が出勤しても年休取得と扱える","「出勤しても就業は認めず懲戒対象」とメールで通知","出勤してきたら帰宅を命令し、それでも帰らなくても年休取得として処理","給与計算・勤怠処理上も時季指定日は年休として扱う","是正報告には時季指定日に年休取得とした記録が必要"],law:"労働基準法第39条7項・8項、改正労基法Q&A（厚労省平31・4）",keywords:["年次有給休暇","時季指定","強制出勤","是正勧告","労基署"]},
  {id:73,title:"クマ出没と休業手当・安全対策",cat:"労災・安全衛生",risk:2,q:"クマが工場近くに出没し休業する場合、休業手当は必要か。クマ対策の安全配慮義務とは？",point:["食料品放置等の問題がなければクマは事業外部の原因→不可抗力の可能性あり","在宅勤務が可能な職種は休業させる必要がなく、休業手当が必要","クマの危険に対しても安全配慮義務あり（スズメバチ刺傷裁判例）","基本対策：出没情報収集・複数人行動・クマ避けグッズ・クマ撃退スプレー訓練","自家用車通勤への変更を柔軟に認めることも必要"],law:"労働基準法第26条、労働契約法第5条",keywords:["クマ","休業手当","不可抗力","安全配慮義務","野生動物"]},
  {id:74,title:"昇進を拒否する女性社員",cat:"均等・均衡待遇",risk:2,q:"女性社員を課長に抜擢したが「男性から嫌がらせを受ける」として拒否。どう対応すべきか。",point:["就業規則の配転命令権限があれば命令可能、拒否なら懲戒も可能だが無理やりでは効果なし","まず「管理職からの嫌がらせ懸念」の背景・実態を丁寧に確認","経営層が「性別にとらわれない管理職登用・ハラスメント厳正対処」の方針を表明","相談窓口の明確化・研修での方針周知が必要","2025年4月から101人以上企業に女性管理職比率の公表が義務化"],law:"男女雇用機会均等法、女性活躍推進法",keywords:["女性管理職","昇進拒否","ハラスメント","均等法","女性活躍"]},
  {id:75,title:"森での作業中に脳卒中",cat:"労災・安全衛生",risk:2,q:"森深い施設で作業中に脳卒中で倒れ、救急車到着が遅れ後遺症が残った。労働災害か？",point:["脳卒中自体に業務起因性がなくても、治療機会の喪失により症状悪化なら業務起因性が認められる場合あり","海上・離島・へき地等医療機関が存在しない特別な環境での発症が要件","作業場所がへき地（無医地区・準無医地区）に該当するかが判断の分かれ目","治療が遅れたことにより症状が増悪したことの立証も必要","会社として治療機会喪失の立証に備え、作業場所の医療機関へのアクセス状況を記録"],law:"最判平8・1・23、最判平8・3・5",keywords:["脳卒中","へき地","労災","治療機会喪失","業務起因性"]},

  {id:77,title:"派遣社員の休業補償",cat:"有期・無期転換",risk:2,q:"派遣先からのクレームで派遣社員を交代させる間、休業手当を払う必要があるか。払う場合は6割でよいか。",point:["派遣元が交代要請に争わず応じた場合、特段の事情なければ民法536条2項（全額払い義務）は適用されない","労基法26条の休業手当（6割）の支払い義務は原則として生じる（三都企画建設事件）","ただし派遣社員の勤務状況が派遣契約の義務違反に達している場合は6割も不要","派遣元が新たな派遣先を提示したのに派遣社員が拒否した場合は以後休業手当不要","就業規則整備で派遣先変更時の賃金減額ルールを明確化することも重要"],law:"三都企画建設事件（大阪地判平18・1・6）、労働基準法第26条",keywords:["派遣社員","休業手当","派遣先変更","賃金全額払い","雇用継続"]},
  {id:78,title:"始業が遅れた際の賃金",cat:"賃金・給与",risk:2,q:"前のシフトの電話が長引き次のシフト担当者の業務開始が30分遅れた。この30分に賃金を払う必要はあるか？",point:["待機（手待ち時間）として就業させていれば労働時間として賃金支払い義務あり","「30分後に来てよい」と休ませていても休業手当（6割）の支払い義務あり","さらに民法536条2項の適用（全額払い義務）が問題となり、要件を検討すると全額払いが必要なケースが多い","不均衡（Gだけが30分後）・他の業務に就かせられた可能性がある場合は全額払い義務の可能性が高い","就業規則に前任者の業務が長引く場合の業務開始時刻繰り下げ規定を置くことで全額払い義務を回避できる可能性"],law:"民法第536条2項、労働基準法第26条",keywords:["始業遅延","休業手当","賃金全額払い","コールセンター","シフト"]},
  {id:79,title:"未届けバイクの通勤事故",cat:"労災・安全衛生",risk:1,q:"就業規則でバイク・自転車の届出が必要なのに未届けのバイクで通勤中に事故。通勤災害に当たるか。",point:["「合理的な方法」とは平常使用しているかどうかにかかわらず通常の交通方法が該当","未届けのバイクでも合理的な方法に当たり通勤災害と認定される","泥酔運転・無免許は合理的な方法でないが軽い飲酒・単純免許不携帯は必ずしも合理性を欠かない","会社は未届けのバイクでも事業主証明を速やかに行う義務あり","就業規則違反については別途懲戒・通勤手当不正受給の調査・返還を検討"],law:"労災保険法第7条2項、昭48・12・1庁保険発第24号",keywords:["通勤災害","バイク","未届け","合理的方法","事業主証明"]},
  {id:80,title:"健診を受けない社員",cat:"労災・安全衛生",risk:2,q:"何度勧めても健診を受けない社員がいる。懲戒処分を科せるか。",point:["労働者は健診受診義務を負い（安衛法66条）、拒否は業務命令違反として懲戒可能","ただし懲戒により離職を招く恐れもあり、説得・督促を尽くすことが先決","費用無料・自分で選んだ医師の健診結果提出も可（安衛法66条5項但書）","健康情報管理体制の整備・情報流出不安の解消も受診率向上に有効","懲戒以外の実務的対応：給与明細に未受診の旨を記載して継続的に勧奨"],law:"労働安全衛生法第66条",keywords:["健康診断","受診義務","懲戒","安全配慮義務","個人情報管理"]},
  {id:81,title:"コアタイム外の研修拒否",cat:"労働時間",risk:2,q:"フレックスタイム制（コアタイム10〜15時）の社員が16時開催の研修を拒否。業務命令できるか。",point:["フレックスタイム制では使用者はコアタイム以外の時間帯の就業を業務命令できない（厚労省の見解）","コアタイム外の研修への不参加は懲戒の対象にはできない","ただし人事考課・賞与査定でのマイナス評価は可能とする見解が有力","フレックスタイム制でも日ごとにコアタイムを変えることは可能（就業規則・労使協定の整備が必要）","研修はコアタイム内に行うことが最善策"],law:"労働基準法施行規則第12条の3第1項第2号",keywords:["フレックスタイム","コアタイム","研修","業務命令","人事考課"]},
  {id:82,title:"内定者の初任給を変更",cat:"採用・解雇",risk:2,q:"「基本給20万円＋固定残業代15時間分」で内定を出したが「基本給23万円＋固定残業代5時間分」に変更。不利益変更か？",point:["内定通知の段階で雇用契約が成立し、変更には内定者の合意が必要","当面の支給額は変わらないが将来的（昇給後）に不利益が生じるため不利益変更に当たる","合意は自由な意思に基づく必要があり、書面説明＋十分な情報提供が必要","就業規則に固定残業代15時間分の規定があれば就業規則変更も必要","変更の理由・不利益の最小化・情報提供を書面で丁寧に行い合意書を取得"],law:"労働契約法第3条・8条、山梨県民信用組合事件（最判平28・2・19）",keywords:["内定","初任給","固定残業代","不利益変更","合意"]},
  {id:83,title:"労災を隠した労働者",cat:"労災・安全衛生",risk:3,q:"社員が仕事中の骨折を「自宅での転倒」と虚偽報告。後で判明した場合、会社の死傷病報告義務違反はあるか。",point:["社員の虚偽申告により会社が就業中の負傷と認識していなければ故意なく刑事罰対象外","遅延理由書を提出し、故意がなかったことを丁寧に説明すること","代表者・現場責任者・担当者が「就業中の負傷」と認識したか否かが重要","判明後は遅滞なく（目安：1カ月以内）報告書を提出","ドライブレコーダー映像等の証拠・経緯を書面化し、顛末書を担当者から取得"],law:"労働安全衛生法第120条・122条、安衛則第97条",keywords:["労災隠し","死傷病報告","遅延理由書","故意","書類送検"]},
  {id:84,title:"残業キャンセル界隈",cat:"労働時間",risk:1,q:"「残業キャンセル界隈なので残業しません」と主張する新入社員。適切な対応は？",point:["残業命令の可否は雇用契約と就業規則によって決まり、個人の価値観や好みで変えられない","就業規則・雇用契約書に残業命令権限の規定があれば従業員は従う義務を負う","36協定の締結・届出が時間外労働の前提条件","妊娠・育児・介護中の社員には残業制限・免除の権利が認められる場合あり","価値観の問題ではなく「契約・業務の話」として具体的業務の必要性を説明することが重要"],law:"労働基準法第36条、育児介護休業法第16条の8・9",keywords:["残業","時間外労働","36協定","業務命令","Z世代"]},
];

const CATEGORY_COLORS = {
  "労働時間": {bg:"#EEEDFE",color:"#3C3489"},
  "採用・解雇": {bg:"#FAECE7",color:"#4A1B0C"},
  "ハラスメント": {bg:"#FBEAF0",color:"#4B1528"},
  "懲戒・服務": {bg:"#FAC775",color:"#412402"},
  "賃金・給与": {bg:"#E1F5EE",color:"#04342C"},
  "休暇・休職": {bg:"#E6F1FB",color:"#042C53"},
  "労災・安全衛生": {bg:"#FCEBEB",color:"#501313"},
  "役員・コーポレート": {bg:"#F1EFE8",color:"#2C2C2A"},
  "異動・配転": {bg:"#EAF3DE",color:"#173404"},
  "均等・均衡待遇": {bg:"#FAEEDA",color:"#412402"},
  "就業規則": {bg:"#EEEDFE",color:"#26215C"},
  "退職・退職金": {bg:"#B5D4F4",color:"#042C53"},
  "育児・介護休業": {bg:"#C0DD97",color:"#173404"},
  "有期・無期転換": {bg:"#9FE1CB",color:"#04342C"},
  "出向・転籍": {bg:"#F4C0D1",color:"#4B1528"},
  "個人情報": {bg:"#D3D1C7",color:"#2C2C2A"},
  "労働組合・団体交渉": {bg:"#F7C1C1",color:"#501313"},
};

const ALL_CATS = [...new Set(CASES.map(c=>c.cat))];

let filteredCases = [...CASES];
let activeCat = "all";
let currentModalIdx = 0;

function renderStats() {
  const bar = document.getElementById("stats-bar");
  const catCount = ALL_CATS.length;
  bar.innerHTML = `
    <div class="stat"><strong>${CASES.length}</strong>ケース総数</div>
    <div class="stat"><strong>${catCount}</strong>カテゴリ数</div>
    <div class="stat"><strong>${CASES.filter(c=>c.risk===3).length}</strong>高リスクケース</div>
    <div class="stat"><strong>2024-2026</strong>掲載期間</div>
  `;
}

function renderCatTabs() {
  const tabs = document.getElementById("cat-tabs");
  let html = `<button class="cat-tab active" data-cat="all">すべて（${CASES.length}）</button>`;
  ALL_CATS.forEach(cat=>{
    const n = CASES.filter(c=>c.cat===cat).length;
    html += `<button class="cat-tab" data-cat="${cat}">${cat}（${n}）</button>`;
  });
  tabs.innerHTML = html;
  tabs.querySelectorAll(".cat-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
      tabs.querySelectorAll(".cat-tab").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      activeCat = btn.dataset.cat;
      applyFilters();
    });
  });
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;
  filteredCases = CASES.filter(c=>{
    if(activeCat!=="all" && c.cat!==activeCat) return false;
    if(q) {
      const hay = (c.title+c.cat+c.q+c.keywords.join(" ")+(c.law||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  if(sort==="cat") filteredCases.sort((a,b)=>a.cat.localeCompare(b.cat,"ja")||a.id-b.id);
  else if(sort==="risk") filteredCases.sort((a,b)=>b.risk-a.risk||a.id-b.id);
  else filteredCases.sort((a,b)=>a.id-b.id);
  document.getElementById("count-label").textContent = `${filteredCases.length}件を表示`;
  renderGrid();
}

function riskLabel(r) {
  if(r===3) return '<span style="font-size:12px;background:#FCEBEB;color:#A32D2D;border-radius:4px;padding:2px 7px;">⚠ 高リスク</span>';
  if(r===2) return '<span style="font-size:12px;background:#FAEEDA;color:#854F0B;border-radius:4px;padding:2px 7px;">● 中リスク</span>';
  return '<span style="font-size:12px;background:#EAF3DE;color:#3B6D11;border-radius:4px;padding:2px 7px;">○ 低リスク</span>';
}

function renderGrid() {
  const grid = document.getElementById("grid");
  if(filteredCases.length===0){
    grid.innerHTML='<div class="no-results">該当するケースが見つかりませんでした</div>';
    return;
  }
  const col = CATEGORY_COLORS;
  grid.innerHTML = filteredCases.map((c,i)=>{
    const cc = col[c.cat]||{bg:"#F1EFE8",color:"#2C2C2A"};
    return `<div class="card" onclick="openModal(${i})">
      <div class="card-header">
        <span class="num-badge">第${c.id}回</span>
        <span class="cat-badge" style="background:${cc.bg};color:${cc.color};">${c.cat}</span>
        <div style="flex:1;"></div>
        ${riskLabel(c.risk)}
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-q">${c.q}</div>
      <div class="card-keywords">${c.keywords.slice(0,4).map(k=>`<span class="kw">${k}</span>`).join("")}</div>
    </div>`;
  }).join("");
}

function openModal(filteredIdx) {
  currentModalIdx = filteredIdx;
  renderModal();
  document.getElementById("modal-overlay").classList.add("open");
}

function renderModal() {
  const c = filteredCases[currentModalIdx];
  const col = CATEGORY_COLORS[c.cat]||{bg:"#F1EFE8",color:"#2C2C2A"};
  document.getElementById("modal-body").innerHTML = `
    <div class="modal-num">第${c.id}回</div>
    <div class="modal-title">${c.title}</div>
    <div class="modal-meta">
      <span class="cat-badge" style="background:${col.bg};color:${col.color};">${c.cat}</span>
      ${riskLabel(c.risk)}
    </div>
    <div class="modal-section">
      <h3>ケースの状況（Q）</h3>
      <div class="modal-text">${c.q}</div>
    </div>
    <div class="modal-section">
      <h3>実務上のポイント（A）</h3>
      <ul class="modal-points">${c.point.map(p=>`<li>${p}</li>`).join("")}</ul>
    </div>
    ${c.law?`<div class="modal-section"><h3>関連法令・判例</h3><div class="law-box"><p>${c.law}</p></div></div>`:""}
    <div class="modal-section">
      <h3>キーワード</h3>
      <div class="card-keywords">${c.keywords.map(k=>`<span class="kw">${k}</span>`).join("")}</div>
    </div>
  `;
  document.getElementById("prev-btn").disabled = currentModalIdx===0;
  document.getElementById("next-btn").disabled = currentModalIdx===filteredCases.length-1;
}

document.getElementById("modal-close").addEventListener("click",()=>{
  document.getElementById("modal-overlay").classList.remove("open");
});
document.getElementById("modal-overlay").addEventListener("click",e=>{
  if(e.target===document.getElementById("modal-overlay")) document.getElementById("modal-overlay").classList.remove("open");
});
document.getElementById("prev-btn").addEventListener("click",()=>{
  if(currentModalIdx>0){currentModalIdx--;renderModal();}
});
document.getElementById("next-btn").addEventListener("click",()=>{
  if(currentModalIdx<filteredCases.length-1){currentModalIdx++;renderModal();}
});
document.getElementById("search").addEventListener("input",applyFilters);
document.getElementById("sort").addEventListener("change",applyFilters);
document.addEventListener("keydown",e=>{
  const overlay=document.getElementById("modal-overlay");
  if(!overlay.classList.contains("open")) return;
  if(e.key==="Escape") overlay.classList.remove("open");
  if(e.key==="ArrowLeft"&&currentModalIdx>0){currentModalIdx--;renderModal();}
  if(e.key==="ArrowRight"&&currentModalIdx<filteredCases.length-1){currentModalIdx++;renderModal();}
});

renderStats();
renderCatTabs();
applyFilters();
</script>
</body>
</html>
